<h4>Log Out to Apply changes</h4>
<form class="example-form">
    <!-- <mat-form-field class="example-full-width">
      <mat-label>Company (disabled)</mat-label>
      <input matInput disabled value="Google">
    </mat-form-field> -->
  
    <table class="example-full-width" cellspacing="0"><tr>
      <td><mat-form-field class="example-full-width">
        <mat-label>First name</mat-label>
        <input matInput ="true" disabled value={{fname}}> 
      </mat-form-field></td>
      <td><mat-form-field class="example-full-width">
        <mat-label>Last Name</mat-label>
        <input matInput  disabled value={{lname}}>
      </mat-form-field></td>
    </tr></table>
    <mat-form-field class="example-full-width">
        <mat-label>Email</mat-label>
        <input matInput  [formControl]="email" >
      </mat-form-field>
      <mat-form-field class="example-full-width">
        <mat-label>Phone</mat-label>
        <input matInput  [formControl]="phone" >
      </mat-form-field>
    <p>
      <mat-form-field class="example-full-width">
        <mat-label>Address</mat-label>
        <!-- <textarea matInput placeholder="Ex. 100 Main St">1600 Amphitheatre Pkwy</textarea> -->
        <textarea matInput placeholder="Ex. 100 Main St"></textarea>
      </mat-form-field>
    </p>
  
    <table class="example-full-width" cellspacing="0"><tr>
      <td><mat-form-field class="example-full-width">
        <mat-label>City</mat-label>
        <input matInput placeholder="Ex. Toronto">
      </mat-form-field></td>
      <td><mat-form-field class="example-full-width">
        <mat-label>Province</mat-label>
        <input matInput placeholder="Ex. Ontario">
      </mat-form-field></td>
      <td><mat-form-field class="example-full-width">
        <mat-label>Postal Code</mat-label>
        <input matInput #postalCode maxlength="6" placeholder="Ex. 94105" >
        <mat-hint align="end">{{postalCode.value.length}} / 6</mat-hint>
      </mat-form-field></td>
    </tr></table>
  </form>
  <button mat-raised-button color="primary" [mat-dialog-close]="true" (click)="updateUser()">
    Save
  </button>
