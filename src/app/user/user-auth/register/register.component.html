<div class="card flex justify-content-center">
  <p-card header="User Regisration"  [style]="{ width: '360px' }">
    <form class="example-form">
      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input id="firstname" [formControl]="firstname"matInput placeholder="First Name">
      </mat-form-field>
      &nbsp;
      <mat-form-field appearance="outline">
       <mat-label>Last Name</mat-label>
       <input  [formControl]="lastname"matInput placeholder="Last Name">
     </mat-form-field>
      <br/>
      <mat-form-field appearance="outline">
       <mat-label>Phone Number</mat-label>
       <input  [formControl]="phone"matInput placeholder="Phone Number">
     </mat-form-field>
     &nbsp;
     <mat-form-field appearance="outline">
       <mat-label>Email</mat-label>
       <input required [formControl]="email"matInput placeholder="Email">
     </mat-form-field>
     <br/>
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        
        <input [formControl]="password" matInput placeholder="Password">
      </mat-form-field>
      <br/>
      
      
    </form>
   
      <ng-template pTemplate="footer">
        <div class="info">
          <p>Are you a Merchant? <span routerLink="/merchant/login">Click here</span></p>
         </div>
         <button  [disabled]="!email.valid || !password.valid || !firstname.valid || !lastname.valid" (click)="onSubmit()" class="button"mat-flat-button color="primary">Register</button>
         <div class="alert alert-warning" *ngIf="isSignUpFailed">
          Signup failed!<br />{{ errorMessage }}
          {{ errorMessage }}
        </div>
        <div class="alert alert-success" *ngIf="isSuccessful">
          Your registration is successful!
        </div>
      </ng-template>
  </p-card>
</div>
