<h1>{{merchantid}}</h1>
<br>
<h1>Services</h1>
<mat-list>
    <mat-list-item *ngFor="let services of service">
        <mat-icon matListItemIcon>note</mat-icon>
        <div matListItemTitle>{{services.title}}</div>
        <div matListItemLine>{{services.price | currency:'CAD'}}</div>
        <button (click)="bookService(services)" mat-stroked-button>Book</button>
    </mat-list-item>
</mat-list>
